version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - adrienpoirier
    labels:
      - dependencies
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      radix:
        patterns:
          - "@radix-ui/*"
      playwright:
        patterns:
          - "@playwright/*"
          - "@axe-core/playwright"
      stripe:
        patterns:
          - stripe
          - "@stripe/*"
          - "@better-auth/stripe"
      prisma:
        patterns:
          - prisma
          - "@prisma/*"
      testing:
        patterns:
          - vitest
          - "@vitest/*"
          - "@testing-library/*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - tw-animate-css
          - tailwind-merge
          - tailwind-variants
      auth:
        patterns:
          - better-auth
          - "@better-auth/*"
          - "@better-fetch/*"
      email:
        patterns:
          - react-email
          - "@react-email/*"
          - resend
      serwist:
        patterns:
          - serwist
          - "@serwist/*"
          - esbuild
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      embla:
        patterns:
          - embla-carousel*
      tanstack:
        patterns:
          - "@tanstack/*"
      uploadthing:
        patterns:
          - uploadthing
          - "@uploadthing/*"
      vercel:
        patterns:
          - "@vercel/*"
      arcjet:
        patterns:
          - "@arcjet/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
